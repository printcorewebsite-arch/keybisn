<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" fill="none">
  <!-- Classeur / Folder shape -->
  <rect x="4" y="14" width="44" height="38" rx="4" fill="#1565D8" />
  <path d="M4 18a4 4 0 0 1 4-4h12l4 6h20a4 4 0 0 1 4 4v24a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V18z" fill="#1976E6" />
  <!-- Tab du classeur -->
  <rect x="8" y="10" width="16" height="8" rx="2.5" fill="#1565D8" />

  <!-- Lettre K stylisée dans le classeur -->
  <g transform="translate(16, 24)" fill="white" font-family="Arial, Helvetica, sans-serif" font-weight="800">
    <text font-size="22" y="16">K</text>
  </g>

  <!-- Eclair / Lightning bolt -->
  <polygon points="38,16 32,32 37,32 30,46 44,28 38,28 44,16" fill="#FFD600" stroke="#E6B800" stroke-width="0.5" stroke-linejoin="round" />

  <!-- Texte KEYBIS -->
  <g transform="translate(62, 0)">
    <text y="44" font-family="'Inter', 'Segoe UI', Arial, Helvetica, sans-serif" font-size="34" font-weight="800" letter-spacing="1.5" fill="#0F1B2D">
      KEY<tspan fill="#1565D8">BIS</tspan>
    </text>
  </g>
</svg>